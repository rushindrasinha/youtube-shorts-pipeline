name: tech
display_name: "Tech & Software (v2.0)"
description: "Developer war stories, debugging nightmares, tech culture. Optimized for M1 Pro."

llm:
  model: qwen3:8b
  provider: ollama
  temperature: 0.85

voice:
  engine: kokoro
  speaker: am_echo
  speed: 1.0

quality_gates:
  min_upvotes: 500
  min_comments: 30
  hook_score_threshold: 0.85

visuals:
  fallback: pexels
  premium_threshold: 0.90

script:
  tone: "casual, technical but accessible, self-deprecating humor, insider culture"
  pacing: "fast with technical beats, occasional pauses for punchlines"
  word_count: "150 to 180"

  hooks:
    - id: debugging_horror
      template: "I spent {time} debugging this issue. The solution was {adjective}."
      when: "debugging story with unexpected root cause"
    - id: code_review_shock
      template: "My code review feedback made the junior dev {action}."
      when: "code review gone wrong"
    - id: deployment_disaster
      template: "We shipped this to production. Here's what happened."
      when: "production incident"
    - id: tech_culture
      template: "Every {job_role} will understand this {situation}."
      when: "relatable tech culture moment"

  cta_variants:
    - "Drop your debugging horror stories in the comments."
    - "What's your worst code review experience?"
    - "Subscribe for more tech culture content."

discovery:
  pexels:
    search_query: "computer code laptop developer typing workspace"
    min_limit: 3
  reddit:
    subreddits:
      ["cscareerquestions", "learnprogramming", "webdev", "ProgrammingHumor"]
    min_score: 300
